{% extends "base.html" %}
{% block content %}
<div class="mb-3">
  <label class="form-label">Paciente</label>
  <input 
    type="text" 
    class="form-control" 
    value="{{ consulta.paciente.nome }}" 
    disabled>
</div>
<div class="row justify-content-center">
  <div class="col-md-6">
    <h4>Editar Consulta</h4>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Data</label>
        <input type="date" class="form-control" name="data" value="{{ consulta.data.strftime('%Y-%m-%d') }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Hora</label>
        <input type="time" class="form-control" name="hora" value="{{ consulta.hora.strftime('%H:%M') }}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" name="status">
          <option value="agendada" {% if consulta.status == 'agendada' %}selected{% endif %}>Agendada</option>
          <option value="realizada" {% if consulta.status == 'realizada' %}selected{% endif %}>Realizada</option>
          <option value="cancelada" {% if consulta.status == 'cancelada' %}selected{% endif %}>Cancelada</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Relatório da sessão</label>
        <textarea 
          name="observacao" 
          class="form-control" 
          rows="5"
          placeholder="Descreva como foi a sessão, comportamento do paciente, evolução, etc..."
        >{{ consulta.observacao or '' }}</textarea>
      </div>
      <button class="btn btn-primary" type="submit">Salvar Alterações</button>
      <a href="/agenda" class="btn btn-secondary">Voltar</a>
    </form>
  </div>
</div>
{% endblock %}
