{% extends "base.html" %}
{% block content %}
<div class="container">
  <h3 class="mb-4"><i class="bi bi-journal-text"></i> Anotações de Pacientes</h3>

  <div class="row">
    {% for p in pacientes %}
    <div class="col-md-6">
      <div class="card mb-3 shadow-sm rounded">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="card-title mb-1">
              <i class="bi bi-person"></i> {{ p.nome }}
            </h5>
            <p class="card-text text-muted mb-0">
              {{ p.email or '-' }} <br>
              {{ p.telefone or '-' }}
            </p>
          </div>
          <div>
            <a href="{{ url_for('anotacoes_paciente', id=p.id) }}" class="btn btn-primary btn-sm">
              Ver Anotações
            </a>
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
