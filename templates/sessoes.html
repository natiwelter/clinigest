{% extends "base.html" %}
{% block content %}

<h4 class="mb-4">
  <i class="bi bi-check-circle"></i> Sessões Concluídas
</h4>

{% for c in consultas %}
<div class="card mb-3 shadow-sm rounded">
  <div class="card-body">

    <h5>{{ c.paciente.nome }}</h5>

    <p class="mb-2">
      <i class="bi bi-calendar-event"></i>
      {{ c.data.strftime('%d/%m/%Y') }}
      <br>
      <i class="bi bi-clock"></i>
      {{ c.hora.strftime('%H:%M') }}
    </p>

    <hr>

    <p>
      {{ c.observacao or "Sem observações" }}
    </p>

  </div>
</div>
{% endfor %}

{% endblock %}
