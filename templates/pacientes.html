{% extends "base.html" %}
{% block content %}

<div class="row">

  <!-- Formulário de cadastro -->
  <div class="col-md-5">
    <div class="card shadow-sm rounded p-3 mb-4">
      <h4 class="card-title mb-3">
        <i class="bi bi-person-plus"></i> Novo Paciente
      </h4>

      <form method="POST">

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" class="form-control" name="nome" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" class="form-control" name="telefone">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" name="email">
        </div>

        <div class="mb-3">
          <label class="form-label">Prioridade (0–10)</label>
          <input type="number" class="form-control" name="prioridade" min="0" max="10" value="0">
        </div>

        <button class="btn btn-success w-100" type="submit">
          <i class="bi bi-check-circle"></i> Salvar
        </button>

      </form>
    </div>
  </div>

  <!-- Listagem de pacientes -->
  <div class="col-md-7">
    <h4 class="mb-3">
      <i class="bi bi-people"></i> Lista de Pacientes
    </h4>
    <input 
      type="text" 
      id="buscaPaciente" 
      class="form-control mb-3" 
      placeholder="🔍 Buscar paciente..."
>

    {% for p in pacientes %}
      <div class="card mb-3 shadow-sm rounded paciente-card">

      <div class="card-body d-flex justify-content-between align-items-center">

        <div>
          <h5 class="card-title mb-1">{{ p.nome }}</h5>

          <p class="card-text mb-1">
            <i class="bi bi-telephone"></i> {{ p.telefone or '-' }} <br>
            <i class="bi bi-envelope"></i> {{ p.email or '-' }}
          </p>

          <span class="badge 
            {% if p.prioridade >= 7 %}bg-danger
            {% elif p.prioridade >= 4 %}bg-warning
            {% else %}bg-secondary
            {% endif %}">
            Prioridade: {{ p.prioridade }}
          </span>
        </div>

        <!-- 🔥 BOTÕES ADICIONADOS (sem mexer no layout) -->
        <div class="text-end">

          <small class="text-muted d-block mb-2">
            Criado em {{ p.criado_em.strftime('%d/%m/%Y %H:%M') }}
          </small>

          <a href="/pacientes/editar/{{ p.id }}" class="btn btn-outline-primary btn-sm me-1">
            <i class="bi bi-pencil"></i>
          </a>

          <a href="/pacientes/relatorio/{{ p.id }}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-bar-chart"></i>
          </a>

        </div>

      </div>

    </div>
    {% endfor %}

  </div>

</div>

<script>
  const input = document.getElementById("buscaPaciente");

  input.addEventListener("keyup", function () {
    const filtro = input.value.toLowerCase();
    const pacientes = document.querySelectorAll(".paciente-card");

    pacientes.forEach(function(card) {
      const nome = card.innerText.toLowerCase();

      if (nome.includes(filtro)) {
        card.style.display = "";
      } else {
        card.style.display = "none";
      }
    });
  });
</script>

{% endblock %}
