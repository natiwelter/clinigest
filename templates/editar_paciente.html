{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-sm rounded p-3">
      <h4 class="mb-3">
        <i class="bi bi-pencil"></i> Editar Paciente
      </h4>

      <form method="POST">

        <div class="mb-3">
          <label class="form-label">Nome</label>
          <input type="text" name="nome" class="form-control" value="{{ paciente.nome }}" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Telefone</label>
          <input type="text" name="telefone" class="form-control" value="{{ paciente.telefone }}">
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" value="{{ paciente.email }}">
        </div>

        <div class="mb-3">
          <label class="form-label">Prioridade</label>
          <input type="number" name="prioridade" class="form-control" min="0" max="10" value="{{ paciente.prioridade }}">
        </div>

        <button class="btn btn-success w-100">
          <i class="bi bi-check-circle"></i> Salvar
        </button>

        <a href="/pacientes" class="btn btn-secondary w-100 mt-2">
          Voltar
        </a>

      </form>
    </div>

  </div>
</div>

{% endblock %}
